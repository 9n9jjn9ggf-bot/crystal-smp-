<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal SMP</title>

<!-- Google site verification -->
<meta name="google-site-verification" content="RmSRmPlXJFlSJKq4qYDgEjjU9x7uIrwJwSbfBrp9Id4" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0b1c2c, #06111c);
  color: white;
}

header {
  text-align: center;
  padding: 30px;
}

h1 {
  color: cyan;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #132b3f;
  padding: 20px;
  border-radius: 12px;
}

h2 {
  color: cyan;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 10px;
  text-align: left;
}

.table th {
  background: #1e3f5a;
}

.money { color: #00ff9d; }
.kills { color: #ff4d4d; }

.button {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 20px;
  background: cyan;
  color: black;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
}

.footer {
  text-align: center;
  padding: 20px;
  color: #888;
}
</style>
</head>

<body>

<header>
  <h1>💎 Crystal SMP</h1>
  <p>PvP • Economy • Ore Generators</p>
</header>

<div class="container">

  <div class="grid">

    <div class="card">
      <h2>🟢 Online Players</h2>
      <p id="onlineCount" style="font-size:2rem; text-align:center;">...</p>
      <p style="text-align:center; color:#ccc;">(Simulated count — real count not available)</p>
    </div>

    <div class="card">
      <h2>⚔️ PvP Leaderboard</h2>
      <table class="table" id="pvpTable">
        <tr><th>Player</th><th>Kills</th></tr>
      </table>
    </div>

    <div class="card">
      <h2>💰 Economy Leaderboard</h2>
      <table class="table" id="ecoTable">
        <tr><th>Player</th><th>Money</th></tr>
      </table>
    </div>

    <div class="card">
      <h2>💬 Discord</h2>
      <center>
        <a href="https://discord.gg/FbRddvm3N" target="_blank" class="button">
          Join Discord
        </a>
      </center>
    </div>

  </div>

  <center>
    <a href="minecraft://?addExternalServer=CrystalSMP;eD2-vMbadQiryMg" class="button">
      Join Realm
    </a>
  </center>

</div>

<div class="footer">
  <p>© 2026 Crystal SMP</p>
</div>

<script>
// Simulated player data
let players = [
  {name: "Steve", kills: 12, money: 1500},
  {name: "Alex", kills: 20, money: 2500},
  {name: "DragonSlayer", kills: 30, money: 1800},
  {name: "MinerPro", kills: 5, money: 3200},
  {name: "CrystalKnight", kills: 25, money: 2700}
];

function updateStats() {
  // Simulated online count
  document.getElementById("onlineCount").innerText = 
    Math.floor(Math.random()*15)+1;

  // PvP leaderboard
  let pvpTable = document.getElementById("pvpTable");
  pvpTable.innerHTML = "<tr><th>Player</th><th>Kills</th></tr>";
  players.sort((a,b)=>b.kills-a.kills).forEach(p=>{
    pvpTable.innerHTML += `<tr><td>${p.name}</td><td class="kills">${p.kills}</td></tr>`;
  });

  // Economy leaderboard
  let ecoTable = document.getElementById("ecoTable");
  ecoTable.innerHTML = "<tr><th>Player</th><th>Money</th></tr>";
  players.sort((a,b)=>b.money-a.money).forEach(p=>{
    ecoTable.innerHTML += `<tr><td>${p.name}</td><td class="money">$${p.money}</td></tr>`;
  });
}

// Refresh simulated stats every 5 seconds
setInterval(updateStats, 5000);
updateStats();
</script>

</body>
</html>
